name: Dashboard CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dashboard-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run qa

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dashboard-ci-artifacts
          path: |
            dist/
            public/dashboard-markdown.json
            test-results/

